    <h1>数学分析</h1>

    <p>数学分析是研究函数及其极限、连续性、微积分等性质的数学学科。</p>

    <p>例如，函数的导数定义为：<span class="math">f'(x) = \lim_{h \to 0} \frac{f(x+h) - f(x)}{h}</span></p>

    <p>定积分的定义为：</p>
    <div class="math">
        $$ \int_a^b f(x) \, dx = F(b) - F(a) $$
    </div>

    <p>其中，$F(x)$ 是 $f(x)$ 的一个原函数。</p>
